<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Hall | Quest Board</title>
  <meta name="description" content="Post quests, track contributors, and unlock rewards on a Monster Hunter-inspired guild board. Gamified feature tracking for teams">
  <meta property="og:title" content="Guild Hall — Quest Board">
  <meta property="og:description" content="Post quests, track contributors, and unlock rewards on a Monster Hunter-inspired guild board">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://guildhall.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Guild Hall — Quest Board">
  <meta name="twitter:description" content="Post quests, track contributors, and unlock rewards on a Monster Hunter-inspired guild board">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://guildhall.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta name="theme-color" content="#040714">
  <meta property="og:image" content="https://guildhall.neorgon.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="https://guildhall.neorgon.com/og-preview.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Guild Hall",
    "description": "Post quests, track contributors, and unlock rewards on a Monster Hunter-inspired guild board",
    "url": "https://guildhall.neorgon.com/",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
        <img src="energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <div>
        <h1>Guild Hall</h1>
        <div class="header-subtitle">Quest Board</div>
      </div>
    </div>

    <button class="auth-toggle" id="authToggle" aria-label="Account">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M7.5 6.5C7.5 8.981 9.519 11 12 11s4.5-2.019 4.5-4.5S14.481 2 12 2 7.5 4.019 7.5 6.5zM20 21h1v-1c0-3.859-3.141-7-7-7h-4c-3.86 0-7 3.141-7 7v1h17z"/>
      </svg>
    </button>

    <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home" style="margin-left:5px">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </header>

  <div class="auth-panel" id="authPanel">
    <div class="auth-panel-inner">
      <div id="authGate">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log In</button>
          <button class="auth-tab" data-tab="register">Register</button>
        </div>
        <div class="auth-form" id="authLoginForm">
          <input type="text" id="authLoginUser" placeholder="Hunter name" autocomplete="username" maxlength="20">
          <input type="password" id="authLoginPass" placeholder="Password" autocomplete="current-password">
          <button class="auth-submit" id="authLoginBtn">Log In</button>
        </div>
        <div class="auth-form" id="authRegisterForm" hidden>
          <input type="text" id="authRegUser" placeholder="Hunter name" autocomplete="username" maxlength="20">
          <input type="password" id="authRegPass" placeholder="Password" autocomplete="new-password">
          <input type="password" id="authInviteCode" placeholder="Invite code" autocomplete="off" title="Ask your Guildmaster for the invite code">
          <button class="auth-submit" id="authRegBtn">Register</button>
        </div>
      </div>
      <div id="authUser" hidden>
        <span class="auth-username" id="authUsername"></span>
        <span class="auth-role" id="authRole" hidden>Guildmaster</span>
        <button class="auth-logout" id="authLogout">Log out</button>
      </div>
    </div>
  </div>
  <div class="auth-divider"></div>

  <main id="main">
    <div class="container">

      <div class="guild-banner">
        <div class="guild-banner-text">
          <p class="guild-motto" id="guildMotto"></p>
        </div>
        <div class="guild-stats">
          <div class="guild-stat"><span class="stat-num" id="statQuests">0</span><span class="stat-label">Quests</span></div>
          <div class="guild-stat"><span class="stat-num" id="statHunters">0</span><span class="stat-label">Hunters</span></div>
          <div class="guild-stat"><span class="stat-num" id="statCompleted">0</span><span class="stat-label">Completed</span></div>
        </div>
      </div>

      <div class="board-controls">
        <div class="rank-tabs">
          <button class="rank-tab active" data-rank="all">All Quests</button>
          <button class="rank-tab rank-low" data-rank="low">Low Rank</button>
          <button class="rank-tab rank-high" data-rank="high">High Rank</button>
          <button class="rank-tab rank-master" data-rank="master">Master Rank</button>
        </div>
        <div class="board-filters">
          <select id="filterStatus" class="mh-select">
            <option value="all">All Status</option>
            <option value="requested">Requested</option>
            <option value="posted">Posted</option>
            <option value="active">Active</option>
            <option value="completed">Completed</option>
          </select>
          <select id="filterCategory" class="mh-select">
            <option value="all">All Types</option>
            <option value="hunt">Hunt (Feature)</option>
            <option value="slay">Slay (Bugfix)</option>
            <option value="capture">Capture (Improvement)</option>
            <option value="investigation">Investigation</option>
          </select>
          <span class="result-count" id="resultCount"></span>
        </div>
      </div>

      <div id="questGrid" class="quest-grid"></div>

      <div class="board-actions">
        <button class="btn-request-quest" id="requestQuestBtn">Request a Mission</button>
        <button class="btn-post-quest" id="postQuestBtn">Post a Quest</button>
        <button class="btn-sos" id="sosBtn" title="Send an SOS Flare">SOS Flare</button>
      </div>

    </div>
  </main>

  <!-- Quest detail modal -->
  <div class="modal" id="questModal">
    <div class="modal-panel quest-detail" id="questDetail"></div>
  </div>

  <!-- Post quest modal -->
  <div class="modal" id="postModal">
    <div class="modal-panel post-form">
      <h3>Post a New Quest</h3>
      <label for="questTitle">Quest Name</label>
      <input id="questTitle" type="text" placeholder="e.g. Implement dark mode toggle" maxlength="80">
      <label for="questDesc">Description</label>
      <textarea id="questDesc" rows="3" placeholder="Describe the objective..."></textarea>
      <div class="form-row">
        <div class="form-field">
          <label for="questRank">Rank</label>
          <select id="questRank" class="mh-select">
            <option value="low">Low Rank (1-3 stars)</option>
            <option value="high">High Rank (4-6 stars)</option>
            <option value="master">Master Rank (7-9 stars)</option>
          </select>
        </div>
        <div class="form-field">
          <label for="questStars">Stars</label>
          <select id="questStars" class="mh-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="questCategory">Type</label>
          <select id="questCategory" class="mh-select">
            <option value="hunt">Hunt (Feature)</option>
            <option value="slay">Slay (Bugfix)</option>
            <option value="capture">Capture (Improvement)</option>
            <option value="investigation">Investigation</option>
          </select>
        </div>
        <div class="form-field">
          <label for="questRepo">Repository (optional)</label>
          <input id="questRepo" type="text" placeholder="org/repo">
        </div>
      </div>
      <label for="questReward">Reward Badge</label>
      <select id="questReward" class="mh-select"></select>
      <div class="form-actions">
        <button class="btn-secondary" id="postCancel">Cancel</button>
        <button class="btn-primary" id="postSubmit">Post Quest</button>
      </div>
    </div>
  </div>

  <!-- Request mission modal -->
  <div class="modal" id="requestModal">
    <div class="modal-panel post-form">
      <h3>Request a Mission</h3>
      <label for="reqTitle">Objective</label>
      <input id="reqTitle" type="text" placeholder="e.g. Linkerd + Calico POC" maxlength="80">
      <label for="reqDesc">Description</label>
      <textarea id="reqDesc" rows="3" placeholder="Describe the objective and context..."></textarea>
      <div class="form-row">
        <div class="form-field">
          <label for="reqRank">Rank</label>
          <select id="reqRank" class="mh-select">
            <option value="low">Low Rank (1-3 stars)</option>
            <option value="high">High Rank (4-6 stars)</option>
            <option value="master">Master Rank (7-9 stars)</option>
          </select>
        </div>
        <div class="form-field">
          <label for="reqSublevel">Difficulty (monster)</label>
          <select id="reqSublevel" class="mh-select"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="reqStars">Stars</label>
          <input id="reqStars" type="number" min="0" placeholder="0 = TBD" value="0">
        </div>
        <div class="form-field">
          <label for="reqKarma">Karma</label>
          <input id="reqKarma" type="number" min="0" placeholder="0 = TBD" value="0">
        </div>
      </div>
      <label for="reqCategory">Type</label>
      <select id="reqCategory" class="mh-select">
        <option value="hunt">Hunt (Feature)</option>
        <option value="slay">Slay (Bugfix)</option>
        <option value="capture">Capture (Improvement)</option>
        <option value="investigation">Investigation</option>
      </select>
      <label for="reqSuggestions">Tool suggestions (one per line)</label>
      <textarea id="reqSuggestions" rows="2" placeholder="Linkerd docs&#10;Calico docs"></textarea>
      <div class="form-actions">
        <button class="btn-secondary" id="reqCancel">Cancel</button>
        <button class="btn-primary" id="reqSubmit">Submit Request</button>
      </div>
    </div>
  </div>

  <!-- Hunter card modal -->
  <div class="modal" id="hunterModal">
    <div class="modal-panel hunter-card" id="hunterCard"></div>
  </div>

  <!-- Poogie easter egg -->
  <div class="poogie" id="poogie" title="Pet me!">&#x1F416;</div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
